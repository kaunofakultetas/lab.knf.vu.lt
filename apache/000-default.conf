ServerName lab.knf.vu.lt

<VirtualHost *:8080>
	ServerAdmin admin@knf.vu.lt
	ServerName lab.knf.vu.lt
	DocumentRoot /var/www/html/public/

	ErrorLog /var/www/logs/error.log
	LogFormat "%{X-Forwarded-For}i %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" proxy
	CustomLog /var/www/logs/access.log proxy
</VirtualHost>
<Directory /var/www/html >
	Options -Indexes +FollowSymLinks -MultiViews
	AllowOverride All
	Require all granted
</Directory>

<Directory /var/www/html/storage/app/public >
	php_flag engine off
	<FilesMatch "\.(?:php[0-9]?|phtml|phar|shtml)$">
		Require all denied
	</FilesMatch>
</Directory>
